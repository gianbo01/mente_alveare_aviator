<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Mente Alveare Aviator</title>
    <meta name="theme-color" content="#0f1923">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Aviator">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <form class="auth-card" method="post" onsubmit="return this.password.value === this.confirm_password.value || (alert('Le password non coincidono.'), false)">
        <img class="auth-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Mente Alveare">
        <p class="eyebrow">nuovo pilota</p>
        <h1>registrati</h1>
        <p class="auth-copy">saldo iniziale: 1000 monete salvate su SQLite.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="auth-error">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <label>
            <span>username</span>
            <input name="username" type="text" maxlength="16" autocomplete="username" required>
        </label>

        <label>
            <span>password</span>
            <input name="password" type="password" autocomplete="new-password" required>
        </label>

        <label>
            <span>conferma password</span>
            <input name="confirm_password" type="password" autocomplete="new-password" required>
        </label>

        <button type="submit">crea account</button>
        <a href="/login">hai già un account? login</a>
    </form>
</main>
</body>
</html>
